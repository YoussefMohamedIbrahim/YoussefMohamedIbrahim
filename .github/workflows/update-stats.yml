name: Update Profile Stats & Cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create images directory
        run: mkdir -p images

      - name: Fetch Stats and Repo Cards (Tokyonight Theme)
        run: |
          # 1. Main Stats Card
          curl -o images/stats.svg "https://youssef-readme-stats.vercel.app/api?username=YoussefMohamedIbrahim&show_icons=true&include_all_commits=true&theme=tokyonight&hide_border=true"
          
          # 2. Top Languages Card
          curl -o images/top-langs.svg "https://youssef-readme-stats.vercel.app/api/top-langs/?username=YoussefMohamedIbrahim&layout=compact&theme=tokyonight&hide_border=true"
          
          # 3. Pinned Repositories (KNNEngine & LinAlg)
          curl -o images/knnengine.svg "https://youssef-readme-stats.vercel.app/api/pin/?username=YoussefMohamedIbrahim&repo=KNNEngine&theme=tokyonight&hide_border=true"
          curl -o images/linalg.svg "https://youssef-readme-stats.vercel.app/api/pin/?username=YoussefMohamedIbrahim&repo=LinAlg&theme=tokyonight&hide_border=true"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add images/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update github profile graphics"
          git pull origin main --rebase
          git push
