name: Update Profile Stats & Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Custom Stats Generator
        run: pip install git+https://github.com/YoussefMohamedIbrahim/github_stats.git

      - name: Generate Stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          mkdir -p images
          # Runs your CLI. Outputs to the images folder.
          github-stats YoussefMohamedIbrahim --exclude-languages HTML,CSS,C#,JavaScript,C --output-dir images/

      - name: Commit and Push to ChangeStatsTracker branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create or switch to the ChangeStatsTracker branch
          git checkout -B ChangeStatsTracker
          
          git add images/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update github profile graphics with custom generator"
          
          # Pull any existing changes from the remote branch to avoid conflicts, then push
          git pull origin ChangeStatsTracker --rebase || true
          git push -u origin ChangeStatsTracker
