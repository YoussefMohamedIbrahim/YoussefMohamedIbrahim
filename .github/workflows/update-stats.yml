name: Update Profile Stats & Cards

on:
  schedule:
    - cron: "15 */4 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate GitHub Stats
        uses: YoussefMohamedIbrahim/github_stats@v1.0.0
        with:
          token: ${{ secrets.STATS_TOKEN }}
          username: 'YoussefMohamedIbrahim'
          output_dir: 'images'
          exclude_languages: 'HTML,CSS,C#,JavaScript,C'

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add images/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update github profile graphics with custom generator"
          git pull origin main --rebase
          git push
          git add images/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update github profile graphics with custom generator"
          git pull origin main --rebase
          git push
